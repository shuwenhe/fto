<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTO 测试页面</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-2: #115e59;
      --border: #dbe3ec;
      --ok: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #e0f2fe 0%, var(--bg) 45%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 16px; color: var(--muted); }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 16px;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 15px;
    }
    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: var(--accent-2); }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #f0fdf4;
      color: var(--ok);
      border: 1px solid #bbf7d0;
    }
    code {
      background: #eff6ff;
      padding: 2px 6px;
      border-radius: 6px;
      color: #1e40af;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>FTO 测试页面</h1>
    <p>如果你能看到这里，说明 <code>/fto</code> 路由和页面静态托管已生效。</p>

    <div class="status" id="status">
      页面加载成功，时间：<span id="now"></span>
    </div>

    <div class="row">
      <input id="q" type="text" placeholder="输入一个测试关键词，例如：无线充电" />
      <button id="btn">模拟检索</button>
    </div>

    <p id="result" style="margin-top: 14px; color: #0f172a;"></p>
  </section>

  <script>
    const nowEl = document.getElementById('now');
    const qEl = document.getElementById('q');
    const resultEl = document.getElementById('result');
    const btn = document.getElementById('btn');

    function fmt(d) {
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    }

    nowEl.textContent = fmt(new Date());

    btn.addEventListener('click', () => {
      const q = qEl.value.trim() || '默认测试词';
      resultEl.textContent = `已收到检索词：${q}。这是前端测试页面，后续可对接真实 FTO 检索接口。`;
    });
  </script>
</body>
</html>
